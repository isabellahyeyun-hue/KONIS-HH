<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#1565c0" />
  <title>손위생 관찰기록 PWA</title>

  <link rel="manifest" href="data:application/json,{\"name\":\"손위생 관찰기록 PWA\",\"short_name\":\"손위생PWA\",\"start_url\":\"./\",\"display\":\"standalone\",\"background_color\":\"#ffffff\",\"theme_color\":\"#1565c0\",\"icons\":[{\"src\":\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAQAAADZc7J/AAAAIklEQVR42mNgGAWjYBSMglEwCkQayQBxIYgT0YwGSgeE4QAAAfUB7xQPvGYAAAAASUVORK5CYII=\",\"sizes\":\"32x32\",\"type\":\"image/png\"}]}" />

  <style>
    :root {
      --primary:#1565c0;
      --surface:#f3f6fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#d1d5db;
    }
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;height:100%;width:100%;font-family:'Segoe UI',sans-serif;background:var(--surface);color:var(--text);}
    #app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
    header{background:var(--primary);color:#fff;padding:12px 14px;font-size:1.1rem;font-weight:700;}
    main{flex:1;overflow:hidden;padding:8px;}
    .tab-panel{width:100%;height:100%;overflow:auto;-webkit-overflow-scrolling:touch;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:10px;}
    .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));grid-gap:8px;}
    label{display:flex;flex-direction:column;font-size:0.9rem;}
    input,select,button{min-height:44px;font-size:1rem;border:1px solid var(--border);border-radius:8px;padding:8px;margin-top:4px;}
    .full{grid-column:span 2;}
    .actions{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px;}
    .small-btn{min-height:44px;font-size:0.9rem;background:#eee;border:1px solid var(--border);border-radius:8px;cursor:pointer;}
    .badge{font-size:0.75rem;background:#e2e8f0;border-radius:10px;padding:2px 6px;margin-left:4px;}
    .bottom-nav{display:flex;position:fixed;bottom:0;left:0;width:100%;height:56px;background:#fff;border-top:1px solid var(--border);z-index:1000;}
    .bottom-nav button{flex:1;border:none;background:transparent;font-size:0.85rem;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-direction:column;}
    .bottom-nav button.active{color:var(--primary);font-weight:700;}
    .stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
    .stat-item{background:#fff;padding:8px;border-radius:8px;border:1px solid var(--border);}
    .overflow-hidden{overflow:hidden;}
    .list-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;font-size:0.85rem;border-bottom:1px solid #e2e8f0;padding:4px 0;}
    .list-row.header{font-weight:700;background:#f8fafc;}
    .badge-primary{background:#dbeafe;color:#1e40af;padding:2px 6px;border-radius:8px;font-size:0.75rem;}
  </style>
</head>
<body>
<div id="app">
  <header>손위생 관찰기록 PWA 시스템</header>
  <main>
    <section id="tab-input" class="tab-panel"></section>
    <section id="tab-list" class="tab-panel" style="display:none"></section>
    <section id="tab-stats" class="tab-panel" style="display:none"></section>
    <section id="tab-settings" class="tab-panel" style="display:none"></section>
  </main>
  <nav class="bottom-nav" aria-label="탭 네비게이션">
    <button id="btn-tab-input" class="active">입력</button>
    <button id="btn-tab-list">조회/수정</button>
    <button id="btn-tab-stats">통계</button>
    <button id="btn-tab-settings">설정</button>
  </nav>
</div>

<script>
const JOBS=[
  {code:'2',label:'간호사'},{code:'11',label:'의사'},{code:'31',label:'임상병리사'},{code:'32',label:'물리치료사'},{code:'33',label:'방사선사'},{code:'39',label:'기타'}
];
const LOCATIONS=[
  {code:'29',label:'2병동'},{code:'29',label:'3병동'},{code:'29',label:'4병동'},{code:'5',label:'외래'},{code:'62',label:'물리치료실'},{code:'61',label:'채혈실'},{code:'63',label:'방사선실'}
];
const MOMENTS=[
  '환자접촉전','청결/무균처치전','체액노출위험후','환자접촉후','환자주변접촉후'
];
const PERFORM_MAP={'1':'Handrubbing','2':'Handwashing','3':'미수행'};
const STORAGE_KEY='handhygiene_records_v1';
const DEVICE_ID_KEY='handhygiene_device_id';
const GAS_ENDPOINT='https://script.google.com/macros/s/your-script-id/exec';

function uuidv4(){return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>(c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16));}

function formatDateYMD(d){ const y=d.getFullYear();const m=('0'+(d.getMonth()+1)).slice(-2);const day=('0'+d.getDate()).slice(-2); return `${y}${m}${day}`; }
function formatTime(date){return `${('0'+date.getHours()).slice(-2)}:${('0'+date.getMinutes()).slice(-2)}`;}

function getRecords(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');}catch(e){return [];}}
function setRecords(records){localStorage.setItem(STORAGE_KEY,JSON.stringify(records));}

function getDeviceId(){let id=localStorage.getItem(DEVICE_ID_KEY); if(!id){id=uuidv4();localStorage.setItem(DEVICE_ID_KEY,id);}return id;}

function initUI(){
  const inputSection=document.getElementById('tab-input');
  inputSection.innerHTML='';
  const card=document.createElement('div'); card.className='card';
  const form=document.createElement('form');form.id='input-form';form.className='grid2';

  const observerLabel=labelWithInput('관찰자','observer','text',true,'정혜윤',true);
  const dateInput=labelWithInput('관찰일','date','date',true, new Date().toISOString().slice(0,10));
  const startInput=labelWithInput('관찰 시작','startTime','time',true,formatTime(new Date()));
  const endInput=labelWithInput('관찰 종료','endTime','time',false,'');

  const jobSel=labelWithSelect('직종','job','직종 선택',JOBS);
  const placeSel=labelWithSelect('장소','location','장소 선택',LOCATIONS);

  const momentSel=momentSelector();

  const actionSelect=labelWithSelect('수행값','action','선택',[
    {code:'1',label:'Handrubbing'},{code:'2',label:'Handwashing'},{code:'3',label:'미수행'}
  ]);

  const gloveLabel=labelWithSelect('장갑','glove','선택',[
    {code:'2',label:'미착용'},{code:'1',label:'착용'}
  ],'2');

  form.append(observerLabel,dateInput,startInput,endInput,jobSel,placeSel,momentSel,actionSelect,gloveLabel);

  const saveBtn=document.createElement('button'); saveBtn.type='submit'; saveBtn.textContent='저장';
  saveBtn.className='small-btn full';
  form.appendChild(saveBtn);
  card.appendChild(form);
  inputSection.appendChild(card);

  form.addEventListener('submit',e=>{ e.preventDefault();handleSave();});

  loadFormValues();

  const actionsCard=document.createElement('div'); actionsCard.className='card';
  actionsCard.innerHTML='<strong>행위 선택 (2/2/1 구조)</strong>';
  const row=document.createElement('div');row.className='grid2';
  MOMENTS.forEach(mom=>{
    const btn=document.createElement('button'); btn.type='button'; btn.className='small-btn'; btn.textContent=mom; btn.dataset.moment=mom;
    btn.addEventListener('click',()=>{document.querySelectorAll('.moment-toggle').forEach(el=>el.classList.remove('badge-primary'));btn.classList.add('badge-primary');document.getElementById('moment').value=mom;});
    btn.classList.add('moment-toggle');
    row.appendChild(btn);
  });
  actionsCard.appendChild(row);
  inputSection.appendChild(actionsCard);

  renderList();
  renderStats();
  renderSettings();
}

function labelWithInput(text,id,type,required,value,disabled){
  const lbl=document.createElement('label'); lbl.innerHTML=`${text}`;
  const input=document.createElement('input'); input.id=id; input.name=id; input.type=type; if(required) input.required=true; if(value!==undefined) input.value=value; if(disabled) input.disabled=true; input.style.width='100%';
  lbl.appendChild(input); return lbl;
}

function labelWithSelect(text,id,placeholder,options,defaultValue){
  const lbl=document.createElement('label'); lbl.innerHTML=`${text}`;
  const sel=document.createElement('select'); sel.id=id; sel.name=id;
  const opt0=document.createElement('option'); opt0.value=''; opt0.textContent=placeholder; sel.appendChild(opt0);
  options.forEach(o=>{ const option=document.createElement('option'); option.value=o.code; option.textContent=o.label; option.dataset.label=o.label; sel.appendChild(option); });
  if(defaultValue){sel.value=defaultValue;}
  lbl.appendChild(sel); return lbl;
}

function momentSelector(){
  const lbl=document.createElement('label'); lbl.innerHTML='행위';
  const sel=document.createElement('select'); sel.id='moment'; sel.name='moment'; sel.required=true;
  const opt0=document.createElement('option'); opt0.value=''; opt0.textContent='선택'; sel.appendChild(opt0);
  MOMENTS.forEach(m=>{const opt=document.createElement('option');opt.value=m;opt.textContent=m;sel.appendChild(opt);});
  lbl.appendChild(sel); return lbl;
}

function loadFormValues(){
  const last=JSON.parse(localStorage.getItem('handhygiene_form_state')||'{}');
  if(last.date) document.getElementById('date').value=last.date;
  if(last.startTime) document.getElementById('startTime').value=last.startTime;
  if(last.endTime) document.getElementById('endTime').value=last.endTime;
  if(last.jobCode) document.getElementById('job').value=last.jobCode;
  if(last.locationCode) document.getElementById('location').value=last.locationCode;
  if(last.glove) document.getElementById('glove').value=last.glove;
  document.getElementById('observer').value='정혜윤';
}

function saveFormState(){
  const state={
    date:document.getElementById('date').value,
    startTime:document.getElementById('startTime').value,
    endTime:document.getElementById('endTime').value,
    jobCode:document.getElementById('job').value,
    locationCode:document.getElementById('location').value,
    glove:document.getElementById('glove').value
  };
  localStorage.setItem('handhygiene_form_state',JSON.stringify(state));
}

function handleSave(){
  const observer='정혜윤';
  const date=document.getElementById('date').value;
  const startTime=document.getElementById('startTime').value;
  const endTime=document.getElementById('endTime').value;
  const jobCode=document.getElementById('job').value;
  const locationCode=document.getElementById('location').value;
  const moment=document.getElementById('moment').value;
  const action=document.getElementById('action').value;
  const glove=document.getElementById('glove').value || '2';

  if(!date||!startTime||!jobCode||!locationCode||!moment||!action){
    alert('필수 항목을 모두 입력하세요. (종료 시간은 선택 사항입니다)');return;
  }

  const jobItem=JOBS.find(j=>j.code===jobCode)||{code:jobCode,label:''};
  const locationItem=LOCATIONS.find(l=>l.code===locationCode)||{code:locationCode,label:''};

  const record={
    id:uuidv4(),
    date:date.replace(/-/g,''),
    startTime,startTime,
    endTime:endTime||'',
    observer,createdAt:Date.now(),
    job:{code:jobItem.code,label:jobItem.label},
    location:{code:locationItem.code,label:locationItem.label},
    moment,action,glove
  };

  const records=getRecords(); records.push(record); setRecords(records);

  saveFormState();

  document.getElementById('moment').value='';
  document.getElementById('action').value='';
  document.getElementById('glove').value='2';
  document.querySelectorAll('.moment-toggle').forEach(btn=>btn.classList.remove('badge-primary'));

  alert('저장 완료');
  renderList();
  renderStats();
  triggerBackup();
}

function renderList(){
  const list=document.getElementById('tab-list'); list.innerHTML='';
  const card=document.createElement('div'); card.className='card';
  card.innerHTML='<strong>조회/수정</strong>';
  const rows=getRecords();
  if(!rows.length){card.innerHTML+='<p>데이터가 없습니다.</p>'; list.appendChild(card); return;}

  const headers=["날짜","시작","종료","관찰자","직종","장소","행위","수행형","장갑","수정","삭제"];
  const headerRow=document.createElement('div'); headerRow.className='list-row header'; headers.forEach(h=>{const div=document.createElement('div');div.textContent=h;headerRow.appendChild(div);});
  card.appendChild(headerRow);
  rows.slice().reverse().forEach(rec=>{
    const row=document.createElement('div'); row.className='list-row';
    const vals=[rec.date,rec.startTime,rec.endTime||'','정혜윤',rec.job.label,rec.location.label,rec.moment,PERFORM_MAP[rec.action]||'',rec.glove==='1'?'착용':'미착용'];
    vals.forEach(v=>{const d=document.createElement('div');d.textContent=v;row.appendChild(d);});
    const editBtn=document.createElement('button');editBtn.textContent='수정';editBtn.className='small-btn';editBtn.onclick=()=>editRecord(rec.id);
    const delBtn=document.createElement('button');delBtn.textContent='삭제';delBtn.className='small-btn';delBtn.onclick=()=>deleteRecord(rec.id);
    const container=document.createElement('div');container.style.display='flex';container.style.gap='4px';container.appendChild(editBtn);container.appendChild(delBtn);
    row.appendChild(container);
    card.appendChild(row);
  });
  list.appendChild(card);
}

function editRecord(id){
  const rec=getRecords().find(r=>r.id===id); if(!rec){alert('레코드 없음');return;}
  document.getElementById('date').value=`${rec.date.slice(0,4)}-${rec.date.slice(4,6)}-${rec.date.slice(6,8)}`;
  document.getElementById('startTime').value=rec.startTime;
  document.getElementById('endTime').value=rec.endTime;
  document.getElementById('job').value=rec.job.code;
  document.getElementById('location').value=rec.location.code;
  document.getElementById('moment').value=rec.moment;
  document.getElementById('action').value=rec.action;
  document.getElementById('glove').value=rec.glove;
  renderTab('input');
}

function deleteRecord(id){
  if(!confirm('삭제하시겠습니까?')) return;
  const records=getRecords().filter(r=>r.id!==id); setRecords(records); renderList(); renderStats();
}

function renderStats(){
  const st=document.getElementById('tab-stats'); st.innerHTML='';
  const records=getRecords();
  const total=records.length;
  const performed=records.filter(r=>r.action==='1'||r.action==='2').length;
  const rate=total?((performed/total)*100).toFixed(1):'0.0';
  const groupCount=(list,key)=>{const map=new Map();list.forEach(r=>{const k=key(r)||'기타';map.set(k,(map.get(k)||0)+1);});return Array.from(map.entries()).sort((a,b)=>b[1]-a[1]);};
  const byJob=groupCount(records,r=>r.job.label); const byLoc=groupCount(records,r=>r.location.label); const byMoment=groupCount(records,r=>r.moment);

  const card=document.createElement('div'); card.className='card';
  card.innerHTML=`<strong>통계</strong><p>전체 ${total}건, 수행률 ${rate}%</p>`;
  const grid=document.createElement('div'); grid.className='stat-grid';
  const addStat=(title,value)=>{const item=document.createElement('div');item.className='stat-item';item.innerHTML=`<strong>${title}</strong><p>${value}</p>`;grid.appendChild(item);};
  addStat('전체 수행률',`${rate}%`);
  addStat('전체 건수',total);
  card.appendChild(grid);
  st.appendChild(card);

  function table(title,data){const c=document.createElement('div');c.className='card';c.innerHTML=`<strong>${title}</strong>`;data.forEach(([k,v])=>{const row=document.createElement('div');row.style.display='flex';row.style.justifyContent='space-between';row.style.padding='2px 0';row.innerHTML=`<span>${k}</span><span>${v}</span>`;c.appendChild(row);});st.appendChild(c);} ;
  table('직종별',byJob); table('장소별',byLoc); table('행위별',byMoment);

  const trend=document.createElement('div');trend.className='card';trend.innerHTML='<strong>트렌드</strong>';
  const trendPerDate=groupCount(records,r=>r.date).map(([d,count])=>{
    const performed=records.filter(r=>r.date===d&&(r.action==='1'||r.action==='2')).length;
    const rrate=count?((performed/count)*100).toFixed(1):0;
    return `${d}:${rrate}%`;
  });
  trend.innerHTML += `<p>${trendPerDate.join(', ')||'데이터 없음'}</p>`;
  st.appendChild(trend);
}

async function triggerBackup(){
  const records=getRecords();
  if(!records.length) return;
  const payload={deviceId:getDeviceId(),timestamp:Date.now(),data:records};
  try{
    const resp=await fetch(GAS_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data=await resp.json();
    if(data.status==='ok'){console.log('백업 완료');} else {console.warn('백업 응답:',data);}
  }catch(err){console.warn('백업 실패:',err);}
}

function renderSettings(){
  const set=document.getElementById('tab-settings'); set.innerHTML='';
  const card=document.createElement('div'); card.className='card'; card.innerHTML='<strong>설정</strong>';
  const exportJson=document.createElement('button');exportJson.className='small-btn full';exportJson.textContent='JSON 내보내기'; exportJson.onclick=exportJsonFile;
  const importJson=document.createElement('input');importJson.type='file';importJson.accept='application/json';importJson.style.marginTop='8px';importJson.onchange=importJsonFile;
  const exportXlsx=document.createElement('button');exportXlsx.className='small-btn full';exportXlsx.textContent='KONIS 엑셀 생성'; exportXlsx.onclick=generateKonisExcel;
  const exportPdf=document.createElement('button');exportPdf.className='small-btn full';exportPdf.textContent='PDF 보고서 생성'; exportPdf.onclick=generatePdfReport;
  const exportZip=document.createElement('button');exportZip.className='small-btn full';exportZip.textContent='ZIP 생성 (Excel+PDF)'; exportZip.onclick=generateZip;
  card.append(exportJson,importJson,exportXlsx,exportPdf,exportZip);
  set.appendChild(card);
}

function exportJsonFile(){
  const data=getRecords(); const blob=new Blob([JSON.stringify(data, null,2)],{type:'application/json'});
  downloadBlob(blob,'handhygiene_export_'+formatDateYMD(new Date())+'.json');
}

function importJsonFile(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader(); reader.onload=e=>{
    try{const parsed=JSON.parse(e.target.result); if(Array.isArray(parsed)){setRecords(parsed);renderList();renderStats();alert('임포트 완료');}else alert('유효한 JSON이 아닙니다.');}catch(err){alert('JSON 파싱 실패');}
  };reader.readAsText(file);
}

function downloadBlob(blob,filename){const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);}

function generateKonisExcel(){
  loadSheetJS().then(XLSX=>{
    const records=getRecords(); if(!records.length){alert('저장된 데이터가 없습니다.');return;}
    const columns=[
      '증례코드','관찰구분','관찰자','관찰일[년월일]','관찰시작[시]','관찰시작[분]','관찰종료[시]','관찰종료[분]','관찰대상자이름','진료과','직종','직종[기타]','관찰장소','관찰장소[기타]',
      '행위[환자접촉전]','행위[청결/무균처치전]','행위[체액노출위험 후]','행위[환자 접촉 후]','행위[환자주변접촉 후]',
      '행위기록[환자 접촉 전]','행위기록[청결/무균처치전]','행위기록[체액노출위험 후]','행위기록[환자 접촉 후]','행위기록[환자주변 접촉 후]','손위생수행여부','장갑착용여부','최종유무'
    ];
    const rows=records.map(r=>{
      const durStart=r.startTime.split(':'); const durEnd=r.endTime.split(':');
      const recObj={};
      columns.forEach((c,i)=>{recObj[c]='';});
      recObj['증례코드']=''; recObj['관찰구분']=''; recObj['관찰자']=r.observer; recObj['관찰일[년월일]']=r.date;
      recObj['관찰시작[시]']=durStart[0]||''; recObj['관찰시작[분]']=durStart[1]||'';
      recObj['관찰종료[시]']=durEnd[0]||''; recObj['관찰종료[분]']=durEnd[1]||'';
      recObj['직종']=r.job.label; recObj['직종[기타]']=r.job.code==='39'?r.job.label:'';
      recObj['관찰장소']=r.location.label; recObj['관찰장소[기타]']=r.location.code==='39'?r.location.label:'';
      MOMENTS.forEach(m=>{const key1=`행위[${m}]`; const key2=`행위기록[${m}]`; if(m===r.moment){recObj[key1]=r.action; recObj[key2]=r.action;} else {recObj[key1]=''; recObj[key2]='';}});
      recObj['손위생수행여부']=r.action; recObj['장갑착용여부']=r.glove; recObj['최종유무']='';
      return recObj;
    });
    const ws=XLSX.utils.json_to_sheet(rows,{header:columns});
    const wb={SheetNames:['Sheet1'],Sheets:{Sheet1:ws}};
    const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const blob=new Blob([wbout],{type:'application/octet-stream'});
    downloadBlob(blob,'KONIS_HANDHYGIENE_'+formatDateYMD(new Date()).slice(0,6)+'.xlsx');
  }).catch(ex=>{alert('SheetJS 로딩 실패 '+ex);});
}

function generatePdfReport(){
  loadJsPDF().then(jsPDF=>{
    const records=getRecords(); const doc=new jsPDF();
    doc.setFontSize(14); doc.text('손위생 관찰 통계 보고서',14,18);
    const total=records.length; const performed=records.filter(r=>r.action==='1'||r.action==='2').length; const rate=total?((performed/total)*100).toFixed(1):'0.0';
    doc.setFontSize(11); doc.text(`전체: ${total}`,14,30); doc.text(`수행: ${performed}`,14,36); doc.text(`수행률: ${rate}%`,14,42);
    doc.autoTable({startY:48,head:[['구분','값']],body:[['전체',total],['수행',performed],['수행률',rate+'%']],'theme':'grid'});
    doc.save('handhygiene_report_'+formatDateYMD(new Date())+'.pdf');
  }).catch(ex=>alert('PDF 라이브러리 로딩 실패 '+ex));
}

function generateZip(){
  loadJsZip().then(JSZip=>{
    const zip=new JSZip();
    const records=getRecords();
    const jsonBlob=new Blob([JSON.stringify(records,null,2)],{type:'application/json'});
    zip.file('data.json',jsonBlob);
    Promise.all([zip.generateAsync({type:'blob'})]).then(content=>{downloadBlob(content[0],'handhygiene_bundle_'+formatDateYMD(new Date())+'.zip');});
  }).catch(ex=>alert('JSZip 로딩 실패 '+ex));
}

function renderTab(tab){
  const ids=['input','list','stats','settings'];
  ids.forEach(id=>{document.getElementById('tab-'+id).style.display=(id===tab?'block':'none');document.getElementById('btn-tab-'+id).classList.toggle('active',id===tab);});
}

['input','list','stats','settings'].forEach(id=>{
  document.getElementById('btn-tab-'+id).addEventListener('click',()=>renderTab(id));
});

async function loadSheetJS(){
  if(window.xlsx){return window.xlsx;}
  await loadScript('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js');
  return window.XLSX;
}
async function loadJsPDF(){
  if(window.jspdf){return window.jspdf;}
  await loadScript('https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js');
  await loadScript('https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.28/dist/jspdf.plugin.autotable.min.js');
  window.jsPDF = window.jspdf.jsPDF || window.jsPDF;
  return window.jsPDF;
}
async function loadJsZip(){
  if(window.JSZip) return window.JSZip;
  await loadScript('https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js');
  return window.JSZip;
}

function loadScript(src){return new Promise((resolve,reject)=>{const s=document.createElement('script');s.src=src;s.onload=resolve;s.onerror=()=>reject(new Error('load fail '+src));document.body.appendChild(s);});}

function initServiceWorker(){
  if('serviceWorker' in navigator){
    const swFileContent=`self.addEventListener('install',event=>{event.waitUntil(caches.open('handhygiene-cache-v1').then(cache=>cache.addAll(['./','index.html','https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js','https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js','https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.28/dist/jspdf.plugin.autotable.min.js','https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js']));});
self.addEventListener('fetch',event=>{event.respondWith(caches.match(event.request).then(res=>res||fetch(event.request).then(response=>{const r=response.clone(); caches.open('handhygiene-cache-v1').then(cache=>cache.put(event.request,r)); return response;})).catch(()=>caches.match('./')));});`;
    const blob=new Blob([swFileContent],{type:'text/javascript'});const swUrl=URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).then(()=>console.log('SW registered')).catch(err=>console.warn('SW 등록 오류',err));
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  initUI();
  initServiceWorker();
});
</script>
